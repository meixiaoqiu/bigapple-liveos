name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Live OS project check
        run: python scripts/check_project.py
      - name: Django tests
        run: python manage.py test applications core live_os observer simulation simulation_lab workspace worlds --settings=live_os.test_settings

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theme/static_src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: theme/static_src/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend assets
        run: npm run build
