{% load tailwind_tags %}
<!doctype html>
<html lang="zh-Hans" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · Big Apple Live OS</title>
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="grid min-h-screen place-items-center p-4">
    <section class="card w-full max-w-md border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-4">
        <div>
          <h1 class="card-title text-2xl font-bold tracking-normal">登录</h1>
          <p class="mt-2 text-sm leading-6 text-base-content/70">
            选择世界后，账号会在该世界数据库中认证。普通成员进入成员工作台，拥有治理权限的成员进入世界运营后台。
          </p>
        </div>

        <form class="grid gap-4" method="post">
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
          {% endif %}

          {% if form.world_id.is_hidden %}
            {{ form.world_id }}
          {% else %}
            <label class="grid w-full gap-1.5" for="{{ form.world_id.id_for_label }}">
              <span class="text-sm font-medium text-base-content/70">世界</span>
              {{ form.world_id }}
              {{ form.world_id.errors }}
            </label>
          {% endif %}

          <label class="grid w-full gap-1.5" for="{{ form.username.id_for_label }}">
            <span class="text-sm font-medium text-base-content/70">账号</span>
            {{ form.username }}
            {{ form.username.errors }}
          </label>

          <label class="grid w-full gap-1.5" for="{{ form.password.id_for_label }}">
            <span class="text-sm font-medium text-base-content/70">密码</span>
            {{ form.password }}
            {{ form.password.errors }}
          </label>

          <button class="btn btn-primary w-full" type="submit">登录</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
