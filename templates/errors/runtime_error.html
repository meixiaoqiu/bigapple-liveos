{% load tailwind_tags %}
<!doctype html>
<html lang="zh-Hans" data-theme="bumblebee">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ status_code }} · {{ title }}</title>
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  {% include "partials/runtime_header.html" %}

  <main class="mx-auto grid min-h-[70vh] w-full max-w-3xl place-items-center p-4 lg:p-8">
    <section class="card w-full bg-base-100 shadow">
      <div class="card-body gap-5">
        <div class="flex flex-wrap items-center gap-3">
          <span class="badge badge-neutral badge-lg">{{ status_code }}</span>
          <span class="badge badge-outline">系统提示</span>
        </div>
        <div class="space-y-3">
          <h1 class="text-2xl font-bold tracking-normal">{{ title }}</h1>
          <p class="text-base leading-relaxed text-base-content/75">{{ message }}</p>
          {% if detail %}
            <div class="alert alert-info text-sm">
              <span>{{ detail }}</span>
            </div>
          {% endif %}
        </div>
        <div class="card-actions gap-3">
          <a class="btn btn-primary" href="{{ home_url }}">返回首页</a>
          <a class="btn btn-outline" href="{{ workspace_url }}">进入 Workspace</a>
          <a class="btn btn-ghost" href="{{ login_url }}">登录</a>
          <a class="btn btn-ghost" href="{{ register_url }}">注册</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
